function getData() { return DATA[lang] || DATA.de; }

function addMsg(txt, cls) {
  var d = document.getElementById("log");
  var el = document.createElement("div");
  el.className = cls;
  el.textContent = txt;
  d.appendChild(el);
  d.scrollTop = d.scrollHeight;
}

function getAnswer(txt) {
  var low = txt.toLowerCase();
  var data = getData();
  for (var i = 0; i < data.kb.length; i++) {
    var keys = data.kb[i][0].split("|");
    for (var j = 0; j < keys.length; j++) {
      if (low.indexOf(keys[j]) !== -1) return data.kb[i][1];
    }
  }
  return data.f;
}

function send() {
  var inp = document.getElementById("inp");
  var txt = inp.value.trim();
  if (!txt) return;
  inp.value = "";
  document.getElementById("qs").innerHTML = "";
  addMsg(txt, "u");
  setTimeout(function() { addMsg(getAnswer(txt), "b"); }, 350);
}

function buildUI() {
  var data = getData();
  document.getElementById("log").innerHTML = "";
  document.getElementById("inp").placeholder = data.p;
  addMsg(data.w, "b");
  var qs = document.getElementById("qs");
  qs.innerHTML = "";
  for (var i = 0; i < data.ql.length; i++) {
    (function(label, query) {
      var btn = document.createElement("button");
      btn.className = "q";
      btn.textContent = label;
      btn.onclick = function() {
        document.getElementById("qs").innerHTML = "";
        addMsg(query, "u");
        setTimeout(function() { addMsg(getAnswer(query), "b"); }, 350);
      };
      qs.appendChild(btn);
    })(data.ql[i], data.qq[i]);
  }
}

// Receive language from parent
window.addEventListener("message", function(e) {
  if (e.data && e.data.lang) {
    lang = e.data.lang;
    buildUI();
  }
});

document.getElementById("snd").onclick = send;
document.getElementById("inp").addEventListener("keydown", function(e) {
  if (e.key === "Enter") send();
});

buildUI();
